name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with gateway + ui extras so mypy sees the optional deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gateway,ui]" ruff mypy
      - name: Assert RAC is absent (WF-ADR-0001 standalone invariant)
        run: |
          if python -c "import rac" 2>/dev/null; then
            echo "FAIL: rac must not be importable in a standalone install"
            exit 1
          fi
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy wayfinder_router
      - name: Pytest
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the gateway image
        run: docker build -t wayfinder-router:ci .

  parity:
    # WF-ADR-0042: the shared JS decision core (clients/shared/src/scorer.js) ships in the
    # desktop app's decision-only degraded mode ONLY while it is a byte-for-byte mirror of the
    # Python scorer. Regenerate the golden corpus from the REAL Python core and fail on any drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install the package (for the real Python scorer)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: JS-Python decision-core parity
        run: |
          python tools/golden.py > clients/shared/test/golden.json
          node clients/shared/test/parity.mjs

  desktop:
    # WF-ROADMAP-0009: a regression gate for clients/desktop, not the Phase 5 release pipeline
    # (that's desktop-release.yml — signed/notarized, blocked on an Apple Developer ID cert and
    # notarization API key). macOS-only runner: this is a macOS-only app (WF-ADR-0042 §6), and
    # Tauri's Rust crate needs the real WebKit/AppKit frameworks to build at all, not just to
    # produce a distributable — a Linux runner would need the webkit2gtk/appindicator stand-ins
    # and would exercise the wrong backend entirely.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri
      - name: Install JS deps (workspace — clients/shared + clients/desktop)
        run: npm install
      - name: Frontend typecheck, tests, build
        run: |
          npm test -w @wayfinder/desktop
          npm run build -w @wayfinder/desktop
      - name: Rust build, clippy, test
        working-directory: clients/desktop/src-tauri
        run: |
          cargo build
          cargo clippy --all-targets -- -D warnings
          cargo test
