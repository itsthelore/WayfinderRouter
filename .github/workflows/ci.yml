name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with gateway + ui extras so mypy sees the optional deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gateway,ui]" ruff mypy
      - name: Assert RAC is absent (WF-ADR-0001 standalone invariant)
        run: |
          if python -c "import rac" 2>/dev/null; then
            echo "FAIL: rac must not be importable in a standalone install"
            exit 1
          fi
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy wayfinder_router
      - name: Pytest
        run: pytest -q

  rust:
    # Additive migration gate: Python remains the shipping implementation until the
    # separately reviewed parity/default gates in WF-ADR-0045 are satisfied.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the Rust toolchain and required components
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Rust formatting
        run: cargo +stable fmt --manifest-path rust/Cargo.toml --all -- --check
      - name: Rust workspace tests
        run: cargo +stable test --manifest-path rust/Cargo.toml --workspace --all-features --locked
      - name: Seeded Python-Rust routing differential
        run: |
          cargo +stable build --manifest-path rust/Cargo.toml -p wayfinder-cli --bin wayfinder-router --locked
          python3 rust/crates/wayfinder-compat-tests/differential_route_fuzz.py --cases 200
      - name: Rust documentation tests
        run: cargo +stable test --manifest-path rust/Cargo.toml --doc --workspace --locked
      - name: Rust warning-denied Clippy
        run: >-
          cargo +stable clippy --manifest-path rust/Cargo.toml --workspace --all-targets
          --all-features --locked -- -D warnings

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the gateway image
        run: docker build -t wayfinder-router:ci .

  parity:
    # WF-ADR-0042: the shared JS decision core (clients/shared/src/scorer.js) ships in the
    # desktop app's decision-only degraded mode ONLY while it is a byte-for-byte mirror of the
    # Python scorer. Regenerate the golden corpus from the REAL Python core and fail on any drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install the package (for the real Python scorer)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gateway]"
      - name: JS-Python decision-core parity
        run: |
          python tools/golden.py | diff -u clients/shared/test/golden.json -
          node clients/shared/test/parity.mjs
      - name: Rust-Python fixture provenance
        run: |
          python tools/golden.py | diff -u rust/crates/wayfinder-compat-tests/fixtures/python-golden.json -
          python rust/crates/wayfinder-compat-tests/generate_routing_vectors.py | diff -u rust/crates/wayfinder-compat-tests/fixtures/routing-boundaries.json -
          python rust/crates/wayfinder-compat-tests/generate_config_vectors.py | diff -u rust/crates/wayfinder-compat-tests/fixtures/routing-config.json -
          python rust/crates/wayfinder-compat-tests/generate_gateway_config_vectors.py | diff -u rust/crates/wayfinder-compat-tests/fixtures/gateway-config.json -
          python rust/crates/wayfinder-compat-tests/generate_gateway_http_vectors.py | diff -u rust/crates/wayfinder-compat-tests/fixtures/gateway-http.json -
          python rust/crates/wayfinder-compat-tests/generate_service_unit_vectors.py | diff -u rust/crates/wayfinder-compat-tests/fixtures/service-units.json -
