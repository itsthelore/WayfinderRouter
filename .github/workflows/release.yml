name: Release

# Publish to PyPI via Trusted Publishing (OIDC) when a version tag is pushed.
# No API token or password is stored: PyPI verifies the workflow's identity
# (owner/repo/workflow + the `pypi` environment) against its trusted publisher.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c 'import wayfinder_router; print(wayfinder_router.__version__)')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match package version $ver"
            exit 1
          fi
          echo "publishing wayfinder-router $ver"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
